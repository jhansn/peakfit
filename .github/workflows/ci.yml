name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Docker target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build lint stage
        run: docker build --target lint -t peakfit:lint .

  build:
    name: Build Package (Docker target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build package stage
        run: docker build --target build -t peakfit:build .

  test:
    name: Test (Docker target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build test stage
        run: docker build --target test -t peakfit:test .

